# Main server (HTTP for initial setup, switch to HTTPS after cert provisioning)
server {
    listen 80;
    server_name _;

    # Certbot challenge (always accessible)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API routes — proxy to Node.js
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://mc_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Setup wizard API — stricter rate limit
    location /api/setup/ {
        limit_req zone=setup burst=10 nodelay;
        proxy_pass http://mc_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Static assets — serve from Node.js (it handles SPA routing)
    location / {
        proxy_pass http://mc_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://mc_app;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
}

