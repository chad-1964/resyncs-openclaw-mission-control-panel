# ─────────────────────────────────────────────────────────
# Mission Control — Nginx Site Configuration
# Replace YOUR_DOMAIN with your actual domain name
# ─────────────────────────────────────────────────────────

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=setup:10m rate=5r/s;

# Upstream — Mission Control App
upstream mc_app {
    server app:5000;
    keepalive 32;
}

# HTTP — Redirect to HTTPS (uncomment when SSL is ready)
